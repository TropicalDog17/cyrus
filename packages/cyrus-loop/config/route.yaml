# Route decision-table parameters (DESIGN.md §Route decision table).
# Deterministic policy — NEVER upgrade any of this to an LM call (anti-goal #1).
# Start strict; the table is expected to accumulate special cases over time.

version: 1

# Repos that ALWAYS route to the `full` tier (team conventions + CI in Context,
# spec gate always manual). Personal repos stay out of this list. Match is by the
# `repo` field of the run (Cyrus repository `name`). Also fences the chore rule:
# a work-repo can never auto-approve, no matter its labels.
work_repos: []

chore:
  # All must hold for the chore rule to fire (spec gate auto-approved):
  #   - issue has the `chore` label
  #   - body word count <= max_body_words
  #   - names a concrete target (require_concrete_target)
  #   - repo not in work_repos
  max_body_words: 50
  require_concrete_target: true

small:
  # `small` tier requires estimate <= this AND single-repo. Estimates must be
  # enabled in the Linear team settings for this to ever fire (Devtrop currently
  # has estimation OFF, so `small` is unreachable and such issues fall to `feature`
  # until an admin turns it on — see docs/LINEAR.md).
  max_estimate_points: 2

audit:
  # Every Nth auto-approved chore is flagged chore_audit for retrospective review.
  # Loosening the chore rule requires >= 20 audited chores with zero
  # should_have_gated (DESIGN.md). Sampling is what builds that safety history.
  sample_every: 5
