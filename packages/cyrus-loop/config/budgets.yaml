# Per-tier budget caps (DESIGN.md §Budgets).
# ADVISORY: `budgets.py` reports which caps a FINISHED run exceeded (learn surfaces it as
# over_budget); it does not terminate anything. Runtime termination belongs to the executor
# (Cyrus) — and there is currently no Cyrus config knob for a wall-clock cap, and its config
# updater drops unknown keys (DELTAS #5), so a hard cap would need an external watchdog around
# the session launch (deferred). Start loose; tighten from runs.jsonl percentiles, not intuition.
#
# Units: agent_minutes = wall-clock minutes the executor is active (excludes
# human-gate waiting_minutes); tokens_total = total tokens for the run.

version: 1

tiers:
  chore:
    agent_minutes: 15
    tokens_total: 200000
  small:
    agent_minutes: 45
    tokens_total: 500000
  feature:
    agent_minutes: 120
    tokens_total: 1500000
  full: # work-repos; loosest until we have percentile data
    agent_minutes: 180
    tokens_total: 2500000

# Intended reaction when a cap is hit — ASPIRATIONAL config for a future Cyrus-side watchdog,
# NOT wired today (budgets are advisory; see above). Kept inspectable so the policy is declared
# in one place. "terminate_and_retry" => stop the run, log a failed retry, follow DESIGN §Retry.
on_exceeded: terminate_and_retry
